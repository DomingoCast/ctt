name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the draft release

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Gate: run the full test suite once before any release artifacts are built.
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          # Pinned to match local Homebrew Zig 0.16.0. vaxis 0.6.0 still uses
          # `std.meta.fields` (removed in 0.17-dev) and uucode 0.2.0 needs the
          # newer 3-arg `b.modules.put` (added before 0.16.0 stable). 0.16.0
          # is the narrow window where both work.
          version: 0.16.0
      - name: zig build test
        run: zig build test

  # ──────────────────────────────────────────────────────────────────────────
  # Cross-compile binaries for each supported target.
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: build ${{ matrix.target }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-macos       # Apple Silicon Mac
          - x86_64-linux-gnu    # 64-bit Linux (glibc)
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe
      - name: Stage artifact
        run: |
          mkdir -p artifacts
          cp zig-out/bin/ctt artifacts/ctt-${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: ctt-${{ matrix.target }}
          path: artifacts/ctt-${{ matrix.target }}
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  # Collect artifacts and create a draft GitHub Release attached to the tag.
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: draft release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Compute SHA-256 checksums
        run: |
          cd artifacts
          sha256sum ctt-* > SHA256SUMS
          cat SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/ctt-*
            artifacts/SHA256SUMS
